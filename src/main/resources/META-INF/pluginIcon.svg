<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- terminal window -->
  <rect x="3" y="6" width="34" height="28" rx="5" fill="#2B2D30"/>
  <!-- title-bar dots -->
  <circle cx="8.5" cy="11.5" r="1.25" fill="#585B5F"/>
  <circle cx="12.3" cy="11.5" r="1.25" fill="#585B5F"/>
  <circle cx="16.1" cy="11.5" r="1.25" fill="#585B5F"/>
  <!-- a normal (unlinked) line of output -->
  <rect x="14" y="16" width="11.5" height="2.6" rx="1.3" fill="#585B5F"/>
  <!-- prompt chevron -->
  <polyline points="8,21.5 10.4,23.9 8,26.3" fill="none" stroke="#6FCF50" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the linkified C# symbol: text bar + underline -->
  <rect x="14" y="22.6" width="15" height="3.1" rx="1.55" fill="#58A6FF"/>
  <rect x="14" y="27" width="15" height="1.4" rx="0.7" fill="#58A6FF"/>
  <!-- click cursor sitting on the link -->
  <g transform="translate(23.5,21.5) scale(0.8)">
    <path d="M0 0 L0 15 L4 11.5 L6.6 16.8 L8.4 16 L5.8 10.8 L10.6 10.8 Z" fill="#FFFFFF" stroke="#1E1F22" stroke-width="1.1" stroke-linejoin="round"/>
  </g>
</svg>
