name: Release

# Two ways in:
#   * Push a tag like v0.1.0 -> full release: build, sign, GitHub Release, publish to the Marketplace.
#       git tag v0.1.0 && git push origin v0.1.0
#   * Run manually (Actions -> Release -> Run workflow) with a `tag` input -> publish-only: builds that
#     tag and pushes it to the Marketplace, no GitHub Release. Used to backfill versions that were tagged
#     before Marketplace auto-publish existed. Always runs THIS (main) workflow definition, checking out
#     the tag's code — so old tags get the current, publish-enabled pipeline.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish to the Marketplace, e.g. v0.2.0"
        required: true
        type: string

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Tag push -> the pushed tag. Manual dispatch -> the tag from the input.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve version
        id: ver
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build & sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin -PpluginVersion=${{ steps.ver.outputs.version }} --console=plain --stacktrace

      # GitHub Release only for real tag pushes. A manual backfill of an old tag already has its Release.
      - name: Extract release notes from CHANGELOG
        if: github.event_name == 'push'
        run: ./gradlew getChangelog --no-header --no-summary -q --console=plain --project-version=${{ steps.ver.outputs.version }} > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: build/distributions/*-signed.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      # publishPlugin fails if the version already exists on the Marketplace, so skip it when it does —
      # keeps re-runs and overlapping backfills idempotent. 32281 is this plugin's permanent Marketplace id.
      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          if curl -fsSL "https://plugins.jetbrains.com/api/plugins/32281/updates" \
               | grep -Eq "\"version\"[[:space:]]*:[[:space:]]*\"$V\""; then
            echo "Version $V is already on the Marketplace — skipping publish."
            exit 0
          fi
          ./gradlew publishPlugin -PpluginVersion="$V" --console=plain --stacktrace
