name: Release

# Push a tag like v0.1.0 to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin -PpluginVersion=${{ steps.ver.outputs.version }} --console=plain --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*-signed.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      # --- Optional: publish to the JetBrains Marketplace ---------------------------------------
      # Enable by adding repo secrets PUBLISH_TOKEN (Marketplace token) and, for signing,
      # CERTIFICATE_CHAIN / PRIVATE_KEY / PRIVATE_KEY_PASSWORD. Then uncomment:
      #
      # - name: Publish to JetBrains Marketplace
      #   env:
      #     PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      #     CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      #     PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      #     PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
      #   run: ./gradlew publishPlugin -PpluginVersion=${{ steps.ver.outputs.version }} --console=plain --stacktrace
