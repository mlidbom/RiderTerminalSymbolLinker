name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # No localIdePath -> the build downloads the pinned stable Rider (gradle.properties).
      # `test` runs the unit tests (FileReferences / SolutionFileIndex); buildPlugin does not depend on it.
      - name: Build plugin
        run: ./gradlew test buildPlugin --console=plain --stacktrace

      - name: Upload plugin zip
        uses: actions/upload-artifact@v7
        with:
          name: RiderTerminalSymbolLinker
          path: build/distributions/*.zip
          if-no-files-found: error
